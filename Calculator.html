<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
      <title>Calculator</title>
  </head>
  <body>
      <h1>Georgia's Calculator</h1>
      <p>Enter two numbers and choose an operator, then click the calculate button:</p>
      <input id="num1" type="number">
      <input id="num2" type="number">
      <button type="button" id="addB" onclick="add()">+</button>
      <button type="button" id="subB" onclick="sub()">-</button>
      <button type="button" id="timesB" onclick="times()">x</button>
      <button type="button" id="divideB" onclick="divide()">/</button>
      <br><br>
      <button type="button" onclick="calculate()">CALCULATE</button>
      <p id="result">RESULT = </p>
      <script>
          var operator = 0;
          function add() {
            document.getElementById("addB").style.color = blue;
            operator = 1;
          }
          function sub() {
            document.getElementById("subB").style.color = blue;
            operator = 2;
          }
          function times() {
            document.getElementById("timesB").style.color = blue;
            operator = 3;
          }
          function divide() {
            document.getElementById("divideB").style.color = blue;
            operator = 4;
          }
          function calculate() {
              var number1 = parseInt(document.getElementById("num1").value);
              var number2 = parseInt(document.getElementById("num2").value);
              var result = 0;
              if (operator == 0) {
                  alert("ERROR: Click an operator");
              }
              if ((number1 == "") || (number2 == "")) {
                  alert("ERROR: Enter a number");
              }
              if (operator == 1) {
                  result = number1 + number2;
              } else if (operator == 2) {
                  result = number1 - number2;
              } else if (operator == 3) {
                  result = number1 * number2;
              } else if (operator == 4) {
                  if (num2 == 0) {
                    result = "undefined";
                  } else {
                    result = number1 / number2;
                  }
              }
              document.getElementById("result").innerHTML = "RESULT = " + result;
          }
      </script>
  </body>
</html>
