<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
      <title>Calculator</title>
  </head>
  <body>
      <h1>Georgia's Calculator</h1>
      <p>Enter two numbers and choose an operator, then click the calculate button:</p>
      <input id="num1" type="number">
      <input id="num2" type="number">
      <button type="button" id="add" onclick="operators('add')">+</button>
      <button type="button" id="sub" onclick="operators('sub')">-</button>
      <button type="button" id="times" onclick="operators('times')">x</button>
      <button type="button" id="divide" onclick="operators('divide')">/</button>
      <button type="button" onclick="calculate()">CALCULATE</button>
      <p id="result">RESULT = </p>
      <script>
          var number1 = parseInt(getElementById("num1").value);
          var number2 = parseInt(getElementById("num2").value);
          var result = 0;
          var operator = "null";
          function calculate() {
              if (operator == "null") {
                  alert("ERROR: Select an operator");
              }
              if ((number1 == "") || (number2 == "")) {
                  alert("ERROR: Enter a number");
              }
              if (operator == "add") {
                  result = number1 + number2;
              } else if (operator == "sub") {
                  result = number1 - number2;
              } else if (operator == "times") {
                  result = number1 * number2;
              } else if (operator == "divide") {
                  if (num2 == 0) {
                    result = "undefined";
                  } else {
                    result = number1 / number2;
                  }
              }
              getElementById("result").innerHTML = "RESULT = " + result;
          }
          function operators(op) {
            getElementById(op).style.color = blue;
            operator = op;
          }
      </script>
  </body>
</html>
