<!DOCTYPE html>
<html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
      <title>Calculator</title>
  </head>
  <body>
      <h1>Georgia's Calculator</h1>
      <p>Enter two numbers and choose an operator, then click the calculate button:</p>
      <input id="num1" type="number">
      <input id="num2" type="number">
      <button type="button" onclick="add()">+</button>
      <button type="button" onclick="sub()">-</button>
      <button type="button" onclick="times()">x</button>
      <button type="button" onclick="divide()">/</button>
      <br><br>
      <button type="button" onclick="calculate()">CALCULATE</button>
      <p id="result">RESULT = </p>
      <script>
          function add() {
            document.getElementById("add").style.color = blue;
            operator = "add";
          }
          function sub() {
            document.getElementById("sub").style.color = blue;
            operator = "sub";
          }
          function times() {
            document.getElementById("times").style.color = blue;
            operator = "times";
          }
          function divide() {
            document.getElementById("divide").style.color = blue;
            operator = "divide";
          }
          function calculate() {
              var number1 = parseInt(document.getElementById("num1").value);
              var number2 = parseInt(document.getElementById("num2").value);
              var result = 0;
              if ((number1 == "") || (number2 == "")) {
                  alert("ERROR: Enter a number");
              }
              if (operator == "add") {
                  result = number1 + number2;
              } else if (operator == "sub") {
                  result = number1 - number2;
              } else if (operator == "times") {
                  result = number1 * number2;
              } else if (operator == "divide") {
                  if (num2 == 0) {
                    result = "undefined";
                  } else {
                    result = number1 / number2;
                  }
              }
              document.getElementById("result").innerHTML = "RESULT = " + result;
          }
      </script>
  </body>
</html>
